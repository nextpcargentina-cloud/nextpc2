<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXT PC - Componentes y Tecnologia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a6fd4;--blue-dark:#1558aa;--blue-light:#e8f1fc;
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f5f7fa;
  --card:#ffffff;--card-b:#dde3ed;
  --text:#1a2233;--muted:#6b7a99;
  --green:#1a9e5c;--red:#d93025;--orange:#e07b00;
}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

header{position:sticky;top:0;z-index:1000;background:#ffffff;box-shadow:0 1px 4px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:68px;gap:1rem;}
.logo-img{height:52px;object-fit:contain;background:#fff;border-radius:6px;}
.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--card-b);border-radius:8px;overflow:hidden;flex:1;max-width:420px;transition:border-color .2s;}
.search-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,111,212,0.12);}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:.55rem 1rem;font-family:inherit;font-size:.92rem;}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap button{background:var(--blue);border:none;cursor:pointer;padding:.55rem 1rem;color:#fff;font-size:1rem;}
.search-wrap button:hover{background:var(--blue-dark);}
.update-label{font-size:.72rem;color:var(--muted);text-align:right;line-height:1.5;white-space:nowrap;}

.hero{padding:2.2rem 2rem 1.6rem;text-align:center;background:linear-gradient(135deg,#1a6fd4 0%,#0d4fa0 100%);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:700;letter-spacing:.04em;color:#fff;margin-bottom:.3rem;position:relative;}
.hero h1 em{color:#93c5fd;font-style:normal;}
.hero p{color:rgba(255,255,255,0.75);font-size:.9rem;position:relative;}

.layout{display:flex;min-height:calc(100vh - 68px);}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--card-b);padding:1rem 0;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--card-b);border-radius:2px;}
.sidebar-title{font-family:'Rajdhani',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:.5rem 1rem .3rem;}
.cat-btn{display:block;width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:.45rem 1rem;font-family:'Exo 2',sans-serif;font-size:.83rem;color:var(--muted);border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-btn:hover{color:var(--text);background:var(--blue-light);}
.cat-btn.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-light);font-weight:600;}

.main{flex:1;padding:1.4rem 1.6rem;}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem;}
.toolbar-left{display:flex;align-items:center;gap:.6rem;}
.result-count{font-size:.8rem;color:var(--muted);}
.sort-sel{background:#fff;border:1px solid var(--card-b);color:var(--text);padding:.36rem .65rem;border-radius:6px;font-family:inherit;font-size:.81rem;cursor:pointer;outline:none;}
.sort-sel:focus{border-color:var(--blue);}
.stock-tog{display:flex;align-items:center;gap:.35rem;font-size:.81rem;color:var(--muted);cursor:pointer;user-select:none;}
.stock-tog input{accent-color:var(--blue);cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.9rem;}
.card{background:#fff;border:1px solid var(--card-b);border-radius:10px;padding:.9rem;display:flex;flex-direction:column;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;}
.card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,111,212,0.12);}
.card-img-wrap{width:100%;height:130px;background:#ffffff;border:1px solid #eef0f4;border-radius:6px;margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;padding:.4rem;}
.card-img-ph{color:var(--muted);font-size:2rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.card-name{font-size:.82rem;color:var(--text);line-height:1.42;flex:1;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-sku{font-size:.67rem;color:var(--muted);margin-bottom:.5rem;}
.price-final{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--blue);line-height:1.1;}
.price-final span{font-size:.85rem;color:var(--muted);font-weight:500;}
.sbadge{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;width:fit-content;margin-top:.45rem;}
.s-in{background:#dcfce7;color:var(--green);}.s-low{background:#fff3e0;color:var(--orange);}.s-out{background:#fde8e8;color:var(--red);}

.btn-comprar{display:block;margin-top:.7rem;background:#25d366;color:#fff;border:none;border-radius:7px;padding:.5rem .8rem;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;transition:background .18s;}
.btn-comprar:hover{background:#1ebe5a;}

.loading{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:1.2rem;}
.spinner{width:44px;height:44px;border:3px solid rgba(26,111,212,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:.88rem;}
.err-box{grid-column:1/-1;background:#fde8e8;border:1px solid #fca5a5;border-radius:10px;padding:2.5rem;text-align:center;max-width:460px;margin:3rem auto;}
.err-box h3{color:var(--red);margin-bottom:.5rem;font-family:'Rajdhani',sans-serif;font-size:1.3rem;}
.err-box p{color:var(--muted);font-size:.86rem;line-height:1.6;}
.btn-retry{margin-top:1.2rem;background:var(--blue);border:none;color:#fff;padding:.55rem 1.6rem;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.9rem;}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted);}
.dots{color:var(--muted);padding:0 .3rem;}
.pag{display:flex;justify-content:center;gap:.4rem;margin-top:1.8rem;flex-wrap:wrap;}
.pbtn{background:#fff;border:1px solid var(--card-b);color:var(--text);padding:.38rem .72rem;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .15s;min-width:36px;text-align:center;}
.pbtn:hover{border-color:var(--blue);color:var(--blue);}
.pbtn.active{background:var(--blue);color:#fff;font-weight:700;border-color:var(--blue);}
.pbtn:disabled{opacity:.3;cursor:default;}
footer{border-top:1px solid var(--card-b);background:#fff;padding:1.3rem 2rem;text-align:center;color:var(--muted);font-size:.77rem;}
footer strong{color:var(--blue);}
@media(max-width:768px){.sidebar{display:none;}.grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}header{padding:0 1rem;}}
</style>
</head>

<script>
var API_URL  = '/api/productos';
var PAGE_SIZE = 48;
var CACHE_KEY = 'npc9_data';
var CACHE_TS  = 'npc9_ts';
var CACHE_HRS = 12;
var S = { all:[], filtered:[], cats:[], cat:'all', q:'', sort:'', stockOnly:false, page:1 };

function fARS(n){ return '$ ' + Math.round(n).toLocaleString('es-AR'); }

function parseCSV(text){
  var lines = text.split('\n').filter(function(l){ return l.trim().length > 0; });
  if(lines.length < 2) return [];
  var first = lines[0];
  var delim = (first.match(/;/g)||[]).length > (first.match(/,/g)||[]).length ? ';' : ',';
  function splitRow(row){
    var res=[], cur='', inQ=false;
    for(var i=0; i<row.length; i++){
      var c=row[i];
      if(c==='"'){ inQ=!inQ; continue; }
      if(c===delim && !inQ){ res.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    res.push(cur.trim());
    return res;
  }
  var H = splitRow(lines[0]).map(function(h){ return h.replace(/"/g,'').trim().toUpperCase(); });
  console.log('Headers:', H);
  var col = {};
  H.forEach(function(h,i){
    if(h === 'CODIGO')           col.sku  = i;
    if(h === 'CATEGORIA')        col.cat  = i;
    if(h === 'DETALLE')          col.name = i;
    if(h === 'IMAGEN')           col.img  = i;
    if(h === 'STOCK')            col.st   = i;
    if(h === 'PRECIO FINAL')     col.pf   = i;
    if(h === 'COTIZACION DOLAR') col.usd  = i;
    if(h === 'PRECIO')           col.p    = i;
  });
  console.log('ColMap:', JSON.stringify(col));
  var out = [];
  for(var i=1; i<lines.length; i++){
    var r = splitRow(lines[i]);
    if(r.length < 4) continue;
    var name = (col.name !== undefined) ? String(r[col.name]||'').replace(/"/g,'').trim() : '';
    if(!name) continue;
    var precioUSD   = parseFloat(String(r[col.p]  ||'0').replace(/[^0-9.,]/g,'').replace(',','.')) || 0;
    var cotiz       = parseFloat(String(r[col.usd] ||'0').replace(/[^0-9.,]/g,'').replace(',','.')) || 0;
    var precioFinal = parseFloat(String(r[col.pf]  ||'0').replace(/[^0-9.,]/g,'').replace(',','.')) || 0;
    var precio = 0;
    if(precioUSD > 0 && cotiz > 0){
      precio = Math.round(precioUSD * cotiz * 1.35);
    } else if(precioFinal > 0){
      precio = Math.round(precioFinal * 1.35);
    } else { continue; }
    out.push({
      sku:    (col.sku !== undefined) ? String(r[col.sku]||'').trim() : '',
      name:   name,
      cat:    (col.cat !== undefined) ? (String(r[col.cat]||'').trim() || 'General') : 'General',
      precio: precio,
      stock:  (col.st !== undefined)  ? (parseInt(String(r[col.st]||'0').replace(/[^0-9]/g,''))||0) : 0,
      img:    (col.img !== undefined) ? String(r[col.img]||'').trim() : ''
    });
  }
  console.log('Parsed:', out.length, 'products');
  return out;
}

function saveCache(p){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify(p)); localStorage.setItem(CACHE_TS,String(Date.now())); }catch(e){} }
function loadCache(){ try{ var c=localStorage.getItem(CACHE_KEY); return c?JSON.parse(c):null; }catch(e){ return null; } }

function fetchData(force){
  if(!force){
    try{
      var c=localStorage.getItem(CACHE_KEY), t=localStorage.getItem(CACHE_TS);
      if(c && t && (Date.now()-Number(t))/3600000 < CACHE_HRS) return Promise.resolve(JSON.parse(c));
    }catch(e){}
  }
  return fetch(API_URL)
    .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.text(); })
    .then(function(txt){
      if(!txt || txt.trim().charAt(0)==='<') throw new Error('Respuesta invalida');
      var p = parseCSV(txt);
      if(!p.length) throw new Error('Sin productos');
      saveCache(p); return p;
    })
    .catch(function(err){ console.error('Fetch error:', err.message); return loadCache(); });
}

function renderCats(){
  var el = document.getElementById('catList');
  var cats = ['Todas'].concat(S.cats);
  var h = '';
  for(var i=0; i<cats.length; i++){
    var c = cats[i];
    var v = (c === 'Todas') ? 'all' : c;
    var active = (S.cat === v) ? ' active' : '';
    h += '<button class="cat-btn' + active + '" onclick="setCat(this)">' + c + '</button>';
  }
  el.innerHTML = h;
}

function setCat(btn){
  var label = btn.textContent.trim();
  S.cat = (label === 'Todas') ? 'all' : label;
  S.page = 1;
  renderCats();
  applyFilters();
}

function mkImg(p){
  if(!p.img) return '<div class="card-img-ph">&#128230;</div>';
  return '<img src="' + p.img + '" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
       + '<div class="card-img-ph" style="display:none">&#128230;</div>';
}

function cardHTML(p){
  var badge = p.stock > 5
    ? '<span class="sbadge s-in">&#10003; En stock</span>'
    : p.stock > 0
      ? '<span class="sbadge s-low">&#9889; &#218;lt. ' + p.stock + ' u.</span>'
      : '<span class="sbadge s-out">&#10005; Sin stock</span>';
  return '<div class="card">'
    + '<div class="card-img-wrap">' + mkImg(p) + '</div>'
    + '<div class="card-name">' + p.name + '</div>'
    + (p.sku ? '<div class="card-sku">SKU: ' + p.sku + '</div>' : '')
    + '<div class="price-final"><span>ARS</span> ' + fARS(p.precio) + '</div>'
    + badge
    + '<a class="btn-comprar" href="https://wa.me/543424787752?text=' + encodeURIComponent('Hola! Me interesa: ' + p.name + ' - Precio: ' + fARS(p.precio)) + '" target="_blank">&#128232; Consultar</a>'
    + '</div>';
}

function renderGrid(){
  var grid = document.getElementById('grid');
  var pag  = document.getElementById('pag');
  var total = S.filtered.length;
  var pages = Math.ceil(total / PAGE_SIZE);
  var items = S.filtered.slice((S.page-1)*PAGE_SIZE, S.page*PAGE_SIZE);
  document.getElementById('resultCount').textContent = total + ' producto' + (total!==1?'s':'');
  if(!items.length){ grid.innerHTML='<div class="empty"><p>Sin resultados</p></div>'; pag.innerHTML=''; return; }
  var h = '';
  for(var i=0; i<items.length; i++) h += cardHTML(items[i]);
  grid.innerHTML = h;
  if(pages<=1){ pag.innerHTML=''; return; }
  var b = '<button class="pbtn" onclick="goPage('+(S.page-1)+')" '+(S.page===1?'disabled':'')+'>&#8592;</button>';
  var f = Math.max(1,S.page-2), t = Math.min(pages,f+4); f = Math.max(1,t-4);
  if(f>1) b += '<button class="pbtn" onclick="goPage(1)">1</button>' + (f>2?'<span class="dots">&#8230;</span>':'');
  for(var i=f; i<=t; i++) b += '<button class="pbtn' + (i===S.page?' active':'') + '" onclick="goPage('+i+')">' + i + '</button>';
  if(t<pages) b += (t<pages-1?'<span class="dots">&#8230;</span>':'') + '<button class="pbtn" onclick="goPage('+pages+')">'+pages+'</button>';
  b += '<button class="pbtn" onclick="goPage('+(S.page+1)+')" '+(S.page===pages?'disabled':'')+'>&#8594;</button>';
  pag.innerHTML = b;
}

function applyFilters(){
  S.sort = document.getElementById('sortSel').value;
  S.stockOnly = document.getElementById('stockOnly').checked;
  S.page = 1;
  var f = S.all.slice();
  if(S.cat !== 'all') f = f.filter(function(p){ return p.cat === S.cat; });
  if(S.q){
    var q = S.q.toLowerCase();
    f = f.filter(function(p){
      return p.name.toLowerCase().indexOf(q) !== -1
          || p.sku.toLowerCase().indexOf(q) !== -1
          || p.cat.toLowerCase().indexOf(q) !== -1;
    });
  }
  if(S.stockOnly) f = f.filter(function(p){ return p.stock > 0; });
  if(S.sort==='pa') f.sort(function(a,b){ return a.precio-b.precio; });
  else if(S.sort==='pd') f.sort(function(a,b){ return b.precio-a.precio; });
  else if(S.sort==='na') f.sort(function(a,b){ return a.name.localeCompare(b.name); });
  S.filtered = f;
  renderGrid();
}

function goPage(n){
  var p = Math.ceil(S.filtered.length/PAGE_SIZE);
  if(n<1||n>p) return;
  S.page = n; renderGrid(); window.scrollTo({top:0,behavior:'smooth'});
}
function applySearch(){ S.q = document.getElementById('searchInput').value.trim(); S.page=1; applyFilters(); }

function init(){
  document.getElementById('fyear').textContent = new Date().getFullYear();
  document.getElementById('grid').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando cat\u00e1logo...</p></div>';
  fetchData(false).then(function(products){
    if(!products || !products.length){
      document.getElementById('grid').innerHTML = '<div class="err-box"><h3>No se pudo cargar</h3><p>Verific\u00e1 tu conexi\u00f3n e intent\u00e1 de nuevo.</p><button class="btn-retry" onclick="init()">Reintentar</button></div>';
      document.getElementById('updateLabel').textContent = 'Error al cargar';
      return;
    }
    S.all = products;
    var cs = {};
    products.forEach(function(p){ if(p.cat) cs[p.cat] = true; });
    S.cats = Object.keys(cs).sort();
    S.filtered = products.slice();
    renderCats(); applyFilters();
    var now = new Date();
    document.getElementById('updateLabel').innerHTML = 'Actualizado<br>' + now.toLocaleDateString('es-AR') + ' ' + now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    setTimeout(function(){
      fetchData(true).then(function(p){
        if(p && p.length){
          S.all = p;
          var cs = {}; p.forEach(function(x){ if(x.cat) cs[x.cat]=true; });
          S.cats = Object.keys(cs).sort();
          renderCats(); applyFilters();
        }
      }).catch(function(){});
    }, 6*3600*1000);
  });
}

document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') applySearch(); });
init();

</script>
</body>
</html>
